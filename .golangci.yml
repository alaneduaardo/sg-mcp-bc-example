version: "2"
linters:
  enable:
    - depguard
  settings:
    depguard:
      rules:
        createspec-no-lateral:
          files:
            - '**/mcp/bc/createspec/**'
          deny:
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/findtargets
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/inspecttarget
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/preview
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/requestpublish
              desc: lateral import between use cases is forbidden
        findtargets-no-lateral:
          files:
            - '**/mcp/bc/findtargets/**'
          deny:
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/inspecttarget
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/createspec
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/preview
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/requestpublish
              desc: lateral import between use cases is forbidden
        inspecttarget-no-lateral:
          files:
            - '**/mcp/bc/inspecttarget/**'
          deny:
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/findtargets
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/createspec
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/preview
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/requestpublish
              desc: lateral import between use cases is forbidden
        preview-no-lateral:
          files:
            - '**/mcp/bc/preview/**'
          deny:
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/findtargets
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/inspecttarget
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/createspec
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/requestpublish
              desc: lateral import between use cases is forbidden
        requestpublish-no-lateral:
          files:
            - '**/mcp/bc/requestpublish/**'
          deny:
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/findtargets
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/inspecttarget
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/createspec
              desc: lateral import between use cases is forbidden
            - pkg: github.com/alaneduardo/sg-mcp-bc-example/mcp/bc/preview
              desc: lateral import between use cases is forbidden
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
